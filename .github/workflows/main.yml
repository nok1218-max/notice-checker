name: 5min-Notice-Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행
  workflow_dispatch:       # 수동 실행 버튼
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 파일을 다시 저장(Push)하기 위한 권한

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests playwright
          # 브라우저 설치뿐만 아니라 필요한 시스템 라이브러리까지 설치
          playwright install --with-deps chromium

      - name: Run Bot
        run: python bot.py

      - name: Save Records
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 파일이 아직 생성되지 않았을 경우를 대비해 git add 전 체크
          git add last_*.txt || echo "파일이 존재하지 않음"
          
          # 변경 사항이 있는지 확인 후 커밋/푸시
          if ! git diff --cached --quiet; then
            git commit -m "Update notices, events, and devlog"
            # 깃허브 액션에서 푸시할 때 발생할 수 있는 충돌 방지를 위해 pull 후 push
            git pull --rebase
            git push
          else
            echo "변경사항 없음"
          fi
