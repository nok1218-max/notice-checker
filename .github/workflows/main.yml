name: 5min-Notice-Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행 (UTC 기준)
  workflow_dispatch:        # 수동으로 실행해볼 수 있는 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 쓰기 권한 (중복 방지용)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Bot
        run: python bot.py

      - name: Save Last Notice # 새 공지 제목을 깃허브에 저장하여 중복 방지
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_notice.txt
          git commit -m "Update last notice" || exit 0
          git push
